name: Update dashboard

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 9:30 AM BRT (UTC-3), Mon–Fri
  workflow_dispatch:            # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # fail fast if Stripe hangs
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-stripe-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-stripe-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Stripe data and regenerate dashboard
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git add collected_cache.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Dashboard updated $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
